<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>德州扑克模拟练习器</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Texas Hold'em Trainer</p>
          <h1>德州扑克模拟练习器</h1>
        </div>
        <nav class="view-tabs" aria-label="主视图">
          <button class="tab active" data-view="play" type="button">牌桌</button>
          <button class="tab" data-view="library" type="button">手牌库</button>
          <button class="tab" data-view="review" type="button">复盘</button>
          <button class="tab" data-view="stats" type="button">数据</button>
          <button class="tab" data-view="config" type="button">配置</button>
        </nav>
      </header>

      <section id="playView" class="view active" aria-label="牌桌对局">
        <section class="play-layout">
          <section class="table-zone" aria-label="牌桌">
            <div class="table-felt">
              <div class="community">
                <span class="table-label">公共牌</span>
                <div id="boardCards" class="cards board-cards"></div>
              </div>
              <div class="pot-display">
                <span>底池</span>
                <strong id="potAmount">0</strong>
              </div>
              <div id="players" class="players"></div>
            </div>
            <div class="hero-panel">
              <div>
                <span class="table-label">你的手牌</span>
                <div id="heroCards" class="cards"></div>
              </div>
              <div class="hero-stack">
                <span id="stageLabel">等待开始</span>
                <strong id="heroStack">--</strong>
              </div>
            </div>
          </section>

          <aside class="control-panel" aria-label="对局控制">
            <div class="round-card">
              <div class="section-head">
                <h2>对局</h2>
                <button id="newHandBtn" class="primary-btn" type="button">开始新手牌</button>
              </div>
              <div class="status-grid">
                <div><span>桌型</span><strong id="tablePresetLabel">--</strong></div>
                <div><span>本地手数</span><strong id="handsPlayed">0</strong></div>
                <div><span>当前需跟</span><strong id="toCallAmount">0</strong></div>
                <div><span>有效后手</span><strong id="effectiveStack">--</strong></div>
              </div>
            </div>

            <div class="round-card">
              <div class="section-head">
                <h2>行动</h2>
                <span id="turnBadge" class="pill">等待发牌</span>
              </div>
              <div class="action-grid">
                <button id="foldBtn" class="action-btn" type="button" disabled>弃牌</button>
                <button id="checkCallBtn" class="action-btn" type="button" disabled>看牌 / 跟注</button>
                <button id="raiseBtn" class="action-btn accent" type="button" disabled>加注</button>
              </div>
              <label class="raise-control" for="raiseSize">
                <span>加注尺度</span>
                <input id="raiseSize" type="range" min="2" max="5" value="3" step="0.5" />
                <strong id="raiseSizeLabel">3x</strong>
              </label>
              <p class="quiet-note">对局中不展示策略建议。每手牌结束后会自动进入手牌库。</p>
            </div>

            <div id="resultPanel" class="round-card result-panel hidden">
              <h2>本手结束</h2>
              <p id="resultText">等待结果</p>
              <div class="result-actions">
                <button id="reviewHandBtn" class="primary-btn" type="button">复盘这手</button>
                <button id="nextHandBtn" class="ghost-btn" type="button">下一手</button>
              </div>
            </div>

            <div class="round-card log-card">
              <div class="section-head">
                <h2>牌局记录</h2>
                <button id="copyLogBtn" class="ghost-btn" type="button">导出</button>
              </div>
              <ol id="handLog" class="hand-log"></ol>
            </div>
          </aside>
        </section>
      </section>

      <section id="libraryView" class="view" aria-label="历史手牌库">
        <div class="library-layout">
          <section class="round-card">
            <div class="section-head">
              <h2>历史对局 / 手牌库</h2>
              <button id="clearLibraryBtn" class="ghost-btn danger" type="button">清空手牌库</button>
            </div>
            <div class="filter-grid">
              <label>筛选
                <input id="librarySearch" type="search" placeholder="手牌、桌型、标签、结果" />
              </label>
              <label>桌型
                <select id="libraryPresetFilter">
                  <option value="">全部</option>
                  <option value="hu">单挑 HU</option>
                  <option value="sixMax">6-max</option>
                  <option value="nineMax">9-max</option>
                  <option value="shortStack">短码</option>
                  <option value="deepStack">深筹码</option>
                </select>
              </label>
            </div>
            <div id="handLibrary" class="hand-library empty-state">暂无历史手牌。</div>
          </section>
          <aside class="round-card">
            <h2>选中手牌</h2>
            <div id="libraryDetail" class="review-summary empty-state">从左侧选择一手牌进行复盘。</div>
          </aside>
        </div>
      </section>

      <section id="reviewView" class="view" aria-label="复盘工作台">
        <div class="review-layout">
          <section class="round-card">
            <div class="section-head">
              <h2>复盘摘要</h2>
              <button class="ghost-btn" data-view-jump="library" type="button">回到手牌库</button>
            </div>
            <div id="reviewSummary" class="review-summary empty-state">从手牌库选择任意历史手牌进入复盘。</div>
          </section>
          <section class="round-card">
            <h2>决策点</h2>
            <div id="decisionReview" class="decision-list empty-state">等待选择手牌。</div>
          </section>
        </div>
      </section>

      <section id="statsView" class="view" aria-label="数据统计">
        <div class="stats-layout">
          <section class="round-card">
            <div class="section-head">
              <h2>训练数据</h2>
              <button id="resetStatsBtn" class="ghost-btn danger" type="button">重置统计</button>
            </div>
            <div id="statsGrid" class="stats-grid"></div>
          </section>
          <section class="round-card">
            <h2>问题诊断</h2>
            <div id="leakReport" class="leak-list"></div>
          </section>
        </div>
      </section>

      <section id="configView" class="view" aria-label="牌桌配置">
        <div class="config-layout">
          <section class="round-card">
            <h2>集成桌型</h2>
            <div id="presetCards" class="preset-grid"></div>
          </section>
          <section class="round-card">
            <h2>自定义参数</h2>
            <form id="configForm" class="config-form">
              <label>人数
                <input id="seatCountInput" type="number" min="2" max="9" step="1" />
              </label>
              <label>小盲
                <input id="smallBlindInput" type="number" min="1" step="1" />
              </label>
              <label>大盲
                <input id="bigBlindInput" type="number" min="2" step="1" />
              </label>
              <label>买入筹码
                <input id="buyInInput" type="number" min="100" step="20" />
              </label>
              <label>AI 档位
                <select id="aiLevelInput">
                  <option value="normal">常规桌</option>
                  <option value="soft">新手桌</option>
                  <option value="tough">强对抗桌</option>
                </select>
              </label>
              <button class="primary-btn" type="submit">保存配置</button>
            </form>
          </section>
        </div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
